name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Endpoint und Project-ID sind öffentliche Client-Config (landen ohnehin
          # im Browser-Bundle) – daher direkt hier statt als GitHub-Secret.
          # Live-Projekt: 6a0ad52d… (das Projekt aus der Appwrite-Konsole).
          VITE_APPWRITE_ENDPOINT: https://fra.cloud.appwrite.io/v1
          VITE_APPWRITE_PROJECT_ID: 6a0ad52d001a8c4fd7f5
        run: npm run build

      - name: SPA-Fallback für GitHub Pages
        # Deep-Links (z. B. die Mail-Klick-Links /verifizieren?... und
        # /passwort-neu?...) würden auf GitHub Pages sonst einen 404 liefern.
        # Pages liefert bei unbekannten Pfaden 404.html aus → dort dieselbe SPA.
        run: cp dist/index.html dist/404.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # Single-Page-App: alle Routen auf index.html umleiten
          force_orphan: true
